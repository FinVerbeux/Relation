async function openVersionsModal(){
  const versions = (await loadVersions()).slice().reverse();
  let html = `<h3>Historique des versions</h3>`;
  html += `<p style="font-size:12px;color:var(--ink-dim);margin:0 0 12px;">Un point de sauvegarde est créé automatiquement toutes les quelques minutes d'activité. Tu peux aussi en créer un manuellement.</p>`;
  if(!versions.length){
    html += `<p style="font-size:12.5px;color:var(--ink-faint);">Aucune version enregistrée pour l'instant.</p>`;
  } else {
    versions.forEach((v,i)=>{
      const data = JSON.parse(v.snapshot);
      const n = Object.keys(data.nodes).length, e = Object.keys(data.edges).length;
      html += `<div class="version-item"><div class="vi-meta"><b>${fmtDate(v.ts)}</b><br>${n} nœuds · ${e} liens</div>
        <button class="btn" data-restore="${versions.length-1-i}">Restaurer</button></div>`;
    });
  }
  html += `<div class="modal-actions"><button class="btn" id="mCancel">Fermer</button><button class="btn primary" id="mCheckpoint"><i class="fa-solid fa-floppy-disk"></i> Créer un point maintenant</button></div>`;
  openModal(html);
  document.getElementById("mCancel").addEventListener("click", closeModal);
  document.getElementById("mCheckpoint").addEventListener("click", async ()=>{
    await saveVersionCheckpoint();
    showToast("Point de sauvegarde créé.");
    closeModal(); openVersionsModal();
  });
  document.querySelectorAll("[data-restore]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      if(!confirm("Restaurer cette version remplacera l'état actuel du dossier (un point de sauvegarde de l'état actuel sera créé avant, par sécurité). Continuer ?")) return;
      await saveVersionCheckpoint();
      const all = await loadVersions();
      const idx = parseInt(el.getAttribute("data-restore"));
      const target = all[idx];
      if(!target){ showToast("Version introuvable."); return; }
      const data = JSON.parse(target.snapshot);
      state.nodes = data.nodes; state.edges = data.edges;
      selected = null; multiSelected = new Set();
      pushHistorySnapshot(); saveSoon();
      closeModal(); renderSidebar(); renderGraph();
      showToast("Version restaurée.");
    });
  });
}

// ---------------- rendu partagé du graphe sur canvas (PNG + rapport PDF) ----------------
function loadImg(src){ return new Promise(res=>{ const img=new Image(); img.onload=()=>res(img); img.onerror=()=>res(null); img.src=src; }); }

async function buildGraphCanvas(){
  const nodes = simulation.nodes();
  if(!nodes.length) return null;
  const edges = edgesArr().filter(e=>state.nodes[e.source] && state.nodes[e.target]);
  const pad = 90;
  const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
  const minX = Math.min(...xs)-pad, maxX = Math.max(...xs)+pad;
  const minY = Math.min(...ys)-pad, maxY = Math.max(...ys)+pad;
  const w = Math.max(400, maxX-minX), h = Math.max(300, maxY-minY);
  const scale = 2;
  const canvas = document.createElement("canvas");
  canvas.width = w*scale; canvas.height = (h+50)*scale;
  const ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);
  ctx.fillStyle = "#0A0D11"; ctx.fillRect(0,0,w,h+50);

  ctx.fillStyle = "#E7E4DC"; ctx.font = "bold 16px sans-serif";
  ctx.fillText(state.caseName || "Enquête", 20, 30);
  ctx.fillStyle = "#565B61"; ctx.font = "11px monospace";
  ctx.fillText(`Exporté le ${new Date().toLocaleDateString('fr-FR')} · ${nodes.length} nœuds · ${edges.length} liens`, 20, 46);

  const tx = (x)=> x - minX, ty = (y)=> y - minY + 55;

  ctx.strokeStyle = "#3a4148"; ctx.lineWidth = 1;
  ctx.font = "9px monospace"; ctx.fillStyle = "#8B8F93";
  edges.forEach(e=>{
    const s = state.nodes[e.source], t = state.nodes[e.target];
    const sn = nodes.find(n=>n.id===s.id), tn = nodes.find(n=>n.id===t.id);
    if(!sn || !tn) return;
    ctx.beginPath();
    ctx.setLineDash(e.status==="exclu" ? [5,3] : []);
    ctx.moveTo(tx(sn.x), ty(sn.y)); ctx.lineTo(tx(tn.x), ty(tn.y)); ctx.stroke();
    ctx.setLineDash([]);
    if(e.label) ctx.fillText(e.label, tx((sn.x+tn.x)/2), ty((sn.y+tn.y)/2)-4);
  });

  for(const n of nodes){
    const node = state.nodes[n.id]; if(!node) continue;
    const x = tx(n.x), y = ty(n.y);
    const color = (TYPES[node.type]||TYPES.note).color;
    const statusColor = {attente:"#5B6470",confirme:"#4C8B62",incertain:"#9C8F5E",exclu:"#B84A3C"}[node.status]||"#5B6470";

    if(node.photo){
      const img = await loadImg(node.photo);
      ctx.save();
      ctx.beginPath(); ctx.arc(x,y,23,0,Math.PI*2); ctx.clip();
      if(img) ctx.drawImage(img, x-23, y-23, 46, 46);
      ctx.restore();
      ctx.beginPath(); ctx.arc(x,y,23,0,Math.PI*2); ctx.lineWidth=2.5; ctx.strokeStyle=statusColor; ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x-23,y-23,46,46,11) : ctx.rect(x-23,y-23,46,46);
      ctx.fillStyle = color; ctx.fill();
      ctx.lineWidth = 2.5; ctx.strokeStyle = statusColor; ctx.stroke();
      ctx.fillStyle = "#fff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline="middle";
      ctx.fillText((TYPES[node.type]||TYPES.note).label.slice(0,2).toUpperCase(), x, y);
      ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
    }
    if(node.status==="exclu"){ ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x-14,y-14); ctx.lineTo(x+14,y+14); ctx.stroke(); }

    ctx.fillStyle = "#E7E4DC"; ctx.font = "600 11px sans-serif"; ctx.textAlign="center";
    ctx.fillText(node.label || "(sans nom)", x, y+40);
    ctx.textAlign = "start";
  }
  return canvas;
}

function caseSlug(){
  return (state.caseName||"dossier").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") || "dossier";
}

// ---------------- export image PNG ----------------
async function exportGraphPNG(){
  const canvas = await buildGraphCanvas();
  if(!canvas){ showToast("Rien à exporter."); return; }
  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${caseSlug()}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    showToast("Image exportée : " + a.download);
  }, "image/png");
}

// ---------------- rapport PDF automatique ----------------
async function exportPDFReport(){
  if(!nodesArr().length){ showToast("Rien à mettre dans le rapport : le dossier est vide."); return; }
  if(!(window.jspdf && window.jspdf.jsPDF)){ showToast("Bibliothèque PDF indisponible (hors-ligne ?)."); return; }
  const loader = document.getElementById("loader");
  const loaderText = document.getElementById("loaderText");
  loader.style.display = "flex"; loaderText.textContent = "Génération du rapport PDF…";

  try{
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit:"mm", format:"a4" });
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const marginX = 15;
    const goldRGB = [201,162,39];
    const inkRGB = [30,32,35];
    const dimRGB = [110,116,122];

    const nodes = nodesArr().sort((a,b)=> (a.label||"").localeCompare(b.label||"", 'fr'));
    const edges = edgesArr().filter(e=>state.nodes[e.source] && state.nodes[e.target]);
    const now = new Date();

    const statusCounts = {attente:0, confirme:0, incertain:0, exclu:0};
    const typeCounts = {};
    nodes.forEach(n=>{
      if(statusCounts[n.status]!==undefined) statusCounts[n.status]++;
      const tl = (TYPES[n.type]||TYPES.note).label;
      typeCounts[tl] = (typeCounts[tl]||0)+1;
    });

    // ---------- Page de garde ----------
    doc.setFillColor(10,13,17); doc.rect(0,0,pageW,pageH,"F");
    doc.setDrawColor(...goldRGB); doc.setLineWidth(0.6);
    doc.rect(10,10,pageW-20,pageH-20);
    doc.setTextColor(...goldRGB);
    doc.setFont("courier","bold"); doc.setFontSize(11);
    doc.text("DOSSIER D'INVESTIGATION", pageW/2, 55, {align:"center"});
    doc.setTextColor(231,228,220);
    doc.setFont("helvetica","bold"); doc.setFontSize(24);
    const nameLines = doc.splitTextToSize(state.caseName || "Enquête sans titre", pageW-50);
    doc.text(nameLines, pageW/2, 75, {align:"center"});
    doc.setDrawColor(...goldRGB); doc.setLineWidth(0.3);
    doc.line(pageW/2-30, 85+ (nameLines.length-1)*9, pageW/2+30, 85+(nameLines.length-1)*9);

    doc.setTextColor(139,143,147); doc.setFont("courier","normal"); doc.setFontSize(10);
    let gy = 105 + (nameLines.length-1)*9;
    doc.text(`Rapport généré le ${now.toLocaleDateString('fr-FR')} à ${now.toLocaleTimeString('fr-FR')}`, pageW/2, gy, {align:"center"}); gy+=7;
    if(state.createdAt){
      doc.text(`Dossier ouvert le ${new Date(state.createdAt).toLocaleDateString('fr-FR')}`, pageW/2, gy, {align:"center"}); gy+=7;
    }
    gy += 10;
    doc.setTextColor(231,228,220); doc.setFont("helvetica","bold"); doc.setFontSize(12);
    doc.text("Synthèse", pageW/2, gy, {align:"center"}); gy += 8;
    doc.setFont("courier","normal"); doc.setFontSize(10); doc.setTextColor(200,200,195);
    doc.text(`${nodes.length} élément(s)  ·  ${edges.length} lien(s)`, pageW/2, gy, {align:"center"}); gy += 10;

    const statLabels = [["confirme","Confirmés",[76,139,98]],["incertain","Incertains",[156,143,94]],["attente","À vérifier",[91,100,112]],["exclu","Exclus",[184,74,60]]];
    statLabels.forEach(([key,label,rgb])=>{
      doc.setFillColor(...rgb); doc.circle(pageW/2-38, gy-1.5, 1.6, "F");
      doc.setTextColor(210,210,205); doc.setFont("helvetica","normal"); doc.setFontSize(10);
      doc.text(`${label} : ${statusCounts[key]||0}`, pageW/2-33, gy);
      gy += 6.5;
    });

    doc.setTextColor(...dimRGB); doc.setFont("courier","normal"); doc.setFontSize(8);
    doc.text("Généré automatiquement — Outil de cartographie OSINT", pageW/2, pageH-15, {align:"center"});

    // ---------- Page synthèse par type ----------
    doc.addPage();
    addHeader(doc, "Répartition par type d'élément", pageW, marginX, goldRGB, inkRGB);
    const typeRows = Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k, String(v)]);
    doc.autoTable({
      startY: 32, margin:{left:marginX, right:marginX},
      head:[["Type d'élément","Nombre"]], body:typeRows,
      theme:"grid", styles:{font:"helvetica", fontSize:9, cellPadding:2.5},
      headStyles:{fillColor:[23,28,35], textColor:[201,162,39], fontStyle:"bold"},
      alternateRowStyles:{fillColor:[247,247,245]}
    });

    // ---------- Page graphe (image) ----------
    const canvas = await buildGraphCanvas();
    if(canvas){
      doc.addPage();
      addHeader(doc, "Cartographie du dossier", pageW, marginX, goldRGB, inkRGB);
      const imgData = canvas.toDataURL("image/png");
      const availW = pageW - marginX*2;
      const availH = pageH - 45;
      const ratio = Math.min(availW/canvas.width, availH/canvas.height);
      const iw = canvas.width*ratio, ih = canvas.height*ratio;
      doc.setFillColor(10,13,17); doc.rect(marginX, 32, availW, availH, "F");
      doc.addImage(imgData, "PNG", marginX + (availW-iw)/2, 32 + (availH-ih)/2, iw, ih);
    }

    // ---------- Détail des éléments ----------
    doc.addPage();
    addHeader(doc, "Détail des éléments", pageW, marginX, goldRGB, inkRGB);
    const nodeRows = nodes.map(n=>{
      const statusLabel = (STATUSES[n.status]||STATUSES.attente).label;
      const notes = [n.notes, n.status==="exclu" && n.excludedReason ? `Exclusion : ${n.excludedReason}`:""].filter(Boolean).join("\n");
      return [
        (TYPES[n.type]||TYPES.note).label,
        n.label || "(sans nom)",
        n.value || "—",
        statusLabel,
        (n.tags||[]).join(", ") || "—",
        notes || "—",
        (n.sources||"").trim() || "—"
      ];
    });
    doc.autoTable({
      startY: 32, margin:{left:marginX, right:marginX},
      head:[["Type","Libellé","Valeur","Statut","Tags","Notes","Sources"]], body:nodeRows,
      theme:"grid", styles:{font:"helvetica", fontSize:8, cellPadding:2, overflow:"linebreak", valign:"top"},
      headStyles:{fillColor:[23,28,35], textColor:[201,162,39], fontStyle:"bold"},
      alternateRowStyles:{fillColor:[247,247,245]},
      columnStyles:{0:{cellWidth:18},1:{cellWidth:26},2:{cellWidth:24},3:{cellWidth:18},4:{cellWidth:20},5:{cellWidth:'auto'},6:{cellWidth:'auto'}},
      didDrawPage: ()=> addHeader(doc, "Détail des éléments (suite)", pageW, marginX, goldRGB, inkRGB, true)
    });

    // ---------- Détail des liens ----------
    if(edges.length){
      doc.addPage();
      addHeader(doc, "Détail des liens", pageW, marginX, goldRGB, inkRGB);
      const edgeRows = edges.map(e=>{
        const s = state.nodes[e.source], t = state.nodes[e.target];
        const statusLabel = (EDGE_STATUSES[e.status]||EDGE_STATUSES.confirme).label;
        return [
          s ? (s.label||"(sans nom)") : "?",
          t ? (t.label||"(sans nom)") : "?",
          e.label || "—",
          statusLabel,
          e.notes || "—"
        ];
      });
      doc.autoTable({
        startY: 32, margin:{left:marginX, right:marginX},
        head:[["Source","Cible","Libellé du lien","Statut","Notes"]], body:edgeRows,
        theme:"grid", styles:{font:"helvetica", fontSize:8.5, cellPadding:2.2, overflow:"linebreak", valign:"top"},
        headStyles:{fillColor:[23,28,35], textColor:[201,162,39], fontStyle:"bold"},
        alternateRowStyles:{fillColor:[247,247,245]},
        didDrawPage: ()=> addHeader(doc, "Détail des liens (suite)", pageW, marginX, goldRGB, inkRGB, true)
      });
    }

    // ---------- pagination ----------
    const pageCount = doc.internal.getNumberOfPages();
    for(let i=2;i<=pageCount;i++){
      doc.setPage(i);
      doc.setFont("courier","normal"); doc.setFontSize(8); doc.setTextColor(...dimRGB);
      doc.text(`Page ${i-1} / ${pageCount-1}`, pageW-marginX, pageH-8, {align:"right"});
      doc.text((state.caseName||"Dossier").toString(), marginX, pageH-8);
    }

    doc.save(`${caseSlug()}-rapport.pdf`);
    showToast("Rapport PDF généré : " + caseSlug() + "-rapport.pdf");
  } catch(err){
    console.error(err);
    showToast("Erreur lors de la génération du rapport PDF.");
  } finally {
    loader.style.display = "none";
  }
}

// ---------------- client autonome (aucune dépendance au site d'hébergement) ----------------
// Objectif : permettre à n'importe quel utilisateur de récupérer une copie du fichier HTML
// et de l'utiliser en local (double-clic), sans jamais revenir sur ce site. Aucune donnée
// de l'utilisateur n'est envoyée nulle part : tout se passe dans son navigateur.
async function downloadStandaloneClient(){
  showToast("Préparation du client autonome…");
  // Tentative n°1 : récupérer le fichier tel qu'il est réellement servi (le plus fidèle).
  // Fonctionne quand l'app est hébergée en http(s) (ex : Cloudflare Pages).
  try{
    const res = await fetch(window.location.href, {cache:"reload"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const html = await res.text();
    if(!/<\/html>/i.test(html)) throw new Error("réponse inattendue");
    downloadHtmlBlob(html);
    showToast("Client téléchargé — ouvrable directement dans un navigateur, sans ce site.");
    return;
  }catch(e){
    console.warn("Récupération directe impossible, repli sur une copie du DOM :", e);
  }
  // Tentative n°2 (repli) : sérialiser la page actuelle en la remettant à l'état vierge
  // (utile en local file://, où fetch() est parfois bloqué par le navigateur).
  try{
    const html = buildCleanHtmlSnapshot();
    downloadHtmlBlob(html);
    showToast("Client téléchargé (copie locale).");
  }catch(e2){
    console.error(e2);
    showToast("Échec du téléchargement automatique. Utilise Ctrl+S depuis cette page.");
  }
}

function downloadHtmlBlob(html){
  const blob = new Blob([html], {type:"text/html;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "dossier-osint-client.html";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

// Construit une copie du HTML courant, nettoyée de tout contenu généré dynamiquement
// et de toute donnée de l'enquête en cours, pour distribuer un client "vierge".
function buildCleanHtmlSnapshot(){
  const clone = document.documentElement.cloneNode(true);
  const clear = (sel)=>{ const el = clone.querySelector(sel); if(el) el.innerHTML = ""; };
  clear("#graph"); clear("#sidebar"); clear("#modalBody");
  const overlay = clone.querySelector("#modalOverlay"); if(overlay) overlay.classList.remove("show");
  const bulkBar = clone.querySelector("#bulkBar"); if(bulkBar){ bulkBar.removeAttribute("style"); bulkBar.style.display="none"; }
  const loader = clone.querySelector("#loader"); if(loader) loader.style.display = "none";
  const caseNameInput = clone.querySelector("#caseName"); if(caseNameInput) caseNameInput.setAttribute("value", "Enquête sans titre");
  const emptyState = clone.querySelector("#emptyState"); if(emptyState) emptyState.removeAttribute("style");
  return "<!DOCTYPE html>\n" + clone.outerHTML;
}

function addHeader(doc, title, pageW, marginX, goldRGB, inkRGB, skipTitle){
  doc.setTextColor(...goldRGB); doc.setFont("courier","normal"); doc.setFontSize(8);
  doc.text((state.caseName||"DOSSIER").toUpperCase(), pageW-marginX, 10, {align:"right"});
  if(!skipTitle){
    doc.setTextColor(30,32,35); doc.setFont("helvetica","bold"); doc.setFontSize(13);
    doc.text(title, marginX, 14);
  }
  doc.setDrawColor(...goldRGB); doc.setLineWidth(0.4);
  doc.line(marginX, 20, pageW-marginX, 20);
}

// ---------------- import / export ----------------
function exportCase(){
  const payload = {
    format: FORMAT_NAME, version: FORMAT_VERSION,
    case: { name: state.caseName, createdAt: state.createdAt, exportedAt: new Date().toISOString() },
    nodes: nodesArr(), edges: edgesArr()
  };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const slug = (state.caseName||"dossier").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") || "dossier";
  a.href = url; a.download = `${slug}.osintree.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  showToast("Export généré : " + a.download);
}
function importCase(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    let data;
    try{ data = JSON.parse(reader.result); }catch(e){ alert("Fichier JSON invalide."); return; }
    if(data.format !== FORMAT_NAME || !Array.isArray(data.nodes)){ alert(`Format non reconnu (attendu : ${FORMAT_NAME}).`); return; }
    if(!confirm("Importer ce dossier remplacera le dossier actuellement ouvert. Continuer ?")) return;
    const ns = defaultState();
    ns.caseName = (data.case && data.case.name) || "Dossier importé";
    ns.createdAt = (data.case && data.case.createdAt) || new Date().toISOString();
    data.nodes.forEach(n=>{ if(n && n.id) ns.nodes[n.id] = Object.assign(makeNode({}), n); });
    (data.edges||[]).forEach(e=>{ if(e && e.id) ns.edges[e.id] = Object.assign(makeEdge({}), e); });
    state = ns; selected = null; hiddenTypes = new Set(); multiSelected = new Set();
    historyStack = [JSON.stringify({nodes:state.nodes, edges:state.edges})]; historyIndex = 0;
    document.getElementById("caseName").value = state.caseName;
    saveSoon(); renderSidebar(); renderGraph(); updateUndoRedoButtons();
    showToast("Dossier importé.");
  };
  reader.readAsText(file);
}

// ---------------- wiring ----------------
function initToolbar(){
  document.getElementById("caseName").addEventListener("input", e=>{ state.caseName = e.target.value; saveSoon(); });
  document.getElementById("search").addEventListener("input", e=>{ searchTerm = e.target.value; renderGraph(); });
  document.getElementById("btnAddNode").addEventListener("click", ()=> openNodeModal(null));
  document.getElementById("btnAddNodeEmpty").addEventListener("click", ()=> openNodeModal(null));
  document.getElementById("btnExport").addEventListener("click", exportCase);
  document.getElementById("btnExportPng").addEventListener("click", exportGraphPNG);
  document.getElementById("btnExportPdf").addEventListener("click", exportPDFReport);
  document.getElementById("btnDownloadClient").addEventListener("click", downloadStandaloneClient);
  document.getElementById("btnUndo").addEventListener("click", undo);
  document.getElementById("btnRedo").addEventListener("click", redo);
  document.getElementById("btnFilters").addEventListener("click", openFiltersModal);
  document.getElementById("btnVersions").addEventListener("click", openVersionsModal);
  document.getElementById("btnCluster").addEventListener("click", ()=>{
    clusterMode = !clusterMode;
    document.getElementById("btnCluster").classList.toggle("active", clusterMode);
    renderGraph();
  });
  document.getElementById("btnImport").addEventListener("click", ()=> document.getElementById("fileInput").click());
  document.getElementById("fileInput").addEventListener("change", e=>{ const f=e.target.files[0]; if(f) importCase(f); e.target.value=""; });
  document.getElementById("btnFit").addEventListener("click", ()=>{ svg.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity); });
  document.getElementById("btnCases").addEventListener("click", openCasesModal);
  document.getElementById("btnAnalyzeFile").addEventListener("click", ()=> document.getElementById("forensicInput").click());
  document.getElementById("forensicInput").addEventListener("change", e=>{
    const f = e.target.files[0]; if(f) handleForensicFile(f); e.target.value="";
  });
  document.getElementById("btnLinkMode").addEventListener("click", ()=>{
    linkMode = !linkMode; linkSourceId=null;
    document.getElementById("btnLinkMode").classList.toggle("active", linkMode);
    renderGraph();
  });
  document.getElementById("btnDelete").addEventListener("click", ()=>{
    if(!selected) return;
    if(selected.kind==="node"){
      const linked = edgesOf(selected.id);
      const msg = linked.length ? `Supprimer cet élément supprimera aussi ses ${linked.length} lien(s). Continuer ?` : "Supprimer cet élément ?";
      if(!confirm(msg)) return;
      linked.forEach(e=> delete state.edges[e.id]);
      delete state.nodes[selected.id];
    } else if(selected.kind==="edge"){
      if(!confirm("Supprimer ce lien ?")) return;
      delete state.edges[selected.id];
    }
    selected = null; saveSoon(); renderSidebar(); renderGraph();
  });
  document.querySelectorAll("#layoutSeg button").forEach(b=>{
    b.addEventListener("click", ()=> applyLayout(b.dataset.layout));
  });
}

// ---------------- boot ----------------
(async function init(){
  state = await loadState();
  document.getElementById("caseName").value = state.caseName;
  historyStack = [JSON.stringify({nodes:state.nodes, edges:state.edges})];
  historyIndex = 0;
  lastCheckpointAt = Date.now();
  initGraph();
  initToolbar();
  updateCenter();
  renderSidebar();
  renderGraph();
  updateUndoRedoButtons();
})();

})();
